<html class="staticrypt-html" lang="en">
  <head>
    <meta charset="utf-8" />
    <title>This portfolio is private</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <style>
      @font-face {
        font-family: "Space Grotesk";
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url("fonts/space-grotesk-latin-700-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Space Grotesk";
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url("fonts/space-grotesk-latin-500-normal.woff2") format("woff2");
      }

      :root {
        --bg: #0a0a0b;
        --panel: #0f0f12;
        --line: rgba(255, 255, 255, 0.08);
        --line-2: rgba(255, 255, 255, 0.16);
        --text: #f4f2ec;
        --muted: #a8a69e;
        --faint: #6d6c66;
        --accent: #4d9dff;
        --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
        --display: "Space Grotesk", "Inter", system-ui, sans-serif;
        --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      * { box-sizing: border-box; }

      .staticrypt-html, .staticrypt-body { height: 100%; }
      .staticrypt-body { margin: 0; }

      .staticrypt-content {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ambient glow, echoing the site */
      .gate-wrap {
        position: relative;
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        overflow: hidden;
      }
      .gate-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(52% 42% at 78% -8%, rgba(77, 157, 255, 0.14), transparent 60%),
          radial-gradient(60% 50% at 8% 110%, rgba(77, 157, 255, 0.06), transparent 60%);
        pointer-events: none;
      }

      .gate-card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 400px;
        background: linear-gradient(180deg, rgba(20, 20, 23, 0.9), rgba(12, 12, 14, 0.9));
        border: 1px solid var(--line-2);
        border-radius: 16px;
        padding: 40px 38px 34px;
        box-shadow: 0 40px 90px rgba(0, 0, 0, 0.6);
        text-align: left;
      }

      .gate-eyebrow {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .gate-eyebrow .dot {
        width: 7px; height: 7px; border-radius: 2px;
        background: var(--accent);
        box-shadow: 0 0 12px rgba(77, 157, 255, 0.7);
      }

      .staticrypt-title {
        font-family: var(--display);
        font-weight: 700;
        font-size: 27px;
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0 0 12px;
        color: var(--text);
      }
      .staticrypt-instructions { margin: 0 0 26px; }
      .staticrypt-instructions p {
        margin: 0;
        color: var(--muted);
        font-size: 14.5px;
        line-height: 1.55;
      }

      .staticrypt-form { margin: 0; }

      .staticrypt-password-container {
        position: relative;
        margin: 0 0 14px;
      }
      .staticrypt-form input[type="password"],
      .staticrypt-form input[type="text"] {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--line-2);
        border-radius: 10px;
        color: var(--text);
        font-family: var(--font);
        font-size: 15px;
        outline: 0;
        padding: 15px 46px 15px 16px;
        transition: border-color 0.2s ease, background 0.2s ease;
      }
      .staticrypt-form input[type="password"]::placeholder,
      .staticrypt-form input[type="text"]::placeholder { color: var(--faint); }
      .staticrypt-form input[type="password"]:focus,
      .staticrypt-form input[type="text"]:focus {
        border-color: var(--accent);
        background: rgba(77, 157, 255, 0.05);
      }

      .staticrypt-toggle-password-visibility {
        cursor: pointer;
        height: 18px;
        width: 18px;
        opacity: 0.5;
        padding: 0;
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        filter: invert(1);
        transition: opacity 0.2s ease;
      }
      .staticrypt-toggle-password-visibility:hover { opacity: 0.85; }

      .gate-error {
        display: none;
        font-family: var(--mono);
        font-size: 11.5px;
        letter-spacing: 0.04em;
        color: #ff6b6b;
        margin: 0 0 14px;
        padding-left: 2px;
      }
      .gate-error.show { display: block; }

      label.staticrypt-remember {
        display: flex;
        align-items: center;
        gap: 11px;
        margin: 0 0 22px;
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
      }
      .staticrypt-remember input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 16px; height: 16px;
        border: 1px solid var(--line-2);
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
        position: relative;
        flex: none;
      }
      .staticrypt-remember input[type="checkbox"]:checked {
        background: var(--accent);
        border-color: var(--accent);
      }
      .staticrypt-remember input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 5px; top: 2px;
        width: 4px; height: 8px;
        border: solid #0a0a0b;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .staticrypt-decrypt-button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: #0a0a0b;
        font-family: var(--display);
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.02em;
        padding: 15px;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      }
      .staticrypt-decrypt-button:hover {
        background: #78b4ff;
        transform: translateY(-1px);
        box-shadow: 0 12px 30px rgba(77, 157, 255, 0.28);
      }
      .staticrypt-decrypt-button:active { transform: translateY(0); }

      .gate-foot {
        margin: 26px 0 0;
        padding-top: 20px;
        border-top: 1px solid var(--line);
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--faint);
        line-height: 1.6;
      }

      .hidden { display: none !important; }

      .staticrypt-spinner-container {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }
      .staticrypt-spinner {
        display: inline-block;
        width: 2rem; height: 2rem;
        border: 0.22em solid rgba(255, 255, 255, 0.15);
        border-right-color: var(--accent);
        border-radius: 50%;
        animation: spinner-border 0.75s linear infinite;
      }
      @keyframes spinner-border { 100% { transform: rotate(360deg); } }

      @media screen and (-webkit-min-device-pixel-ratio: 0) {
        .staticrypt-form input[type="password"],
        .staticrypt-form input[type="text"] { font-size: 16px; }
      }
    </style>
  </head>
